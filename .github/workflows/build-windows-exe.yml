name: Build Windows EXE

on:
  push:
    tags:        # Trigger on tag push
      - 'v*'     # Match tags starting with 'v'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for tags
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests PyQt6 Pillow duckduckgo-search
        
    - name: Convert Icon
      run: |
        python -c "from PIL import Image; img = Image.open('assets/icon.png'); img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)])"

    - name: Build with PyInstaller
      run: pyinstaller --noconfirm --onefile --windowed --icon "assets/icon.ico" --add-data "assets;assets" --name "Bee_ModelBox_Maker" main.py
      
    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bee_ModelBox_Maker-Windows
        path: dist/Bee_ModelBox_Maker.exe

    - name: Create Windows Release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        artifacts: "dist/Bee_ModelBox_Maker.exe"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}

