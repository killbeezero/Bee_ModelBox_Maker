name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for tags
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests PyQt6 Pillow duckduckgo-search
        
    - name: Convert Icon
      run: python -c "from PIL import Image; img = Image.open('assets/icon.png'); img.save('assets/icon.icns', format='ICNS')"
        
    - name: Build with PyInstaller
      run: |
        export MACOSX_DEPLOYMENT_TARGET=10.15
        pyinstaller --noconfirm --windowed --icon "assets/icon.icns" --add-data "assets:assets" --name "Bee_ModelBox_Maker" main.py
        cd dist && tar -czvf Bee_ModelBox_Maker-macOS.tar.gz Bee_ModelBox_Maker.app
      
    - name: Upload Mac App as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bee_ModelBox_Maker-macOS
        path: dist/Bee_ModelBox_Maker-macOS.tar.gz

    - name: Create macOS Release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        artifacts: "dist/Bee_ModelBox_Maker-macOS.tar.gz"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}

