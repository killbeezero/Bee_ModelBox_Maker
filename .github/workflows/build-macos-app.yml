name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests PyQt6 Pillow duckduckgo-search
        
    - name: Convert Icon
      run: |
        python -c "from PIL import Image; img = Image.open('assets/icon.png'); img.save('assets/icon.icns')"
        
    - name: Build with PyInstaller
      run: pyinstaller --noconfirm --windowed --icon "assets/icon.icns" --add-data "assets:assets" --name "Bee_ModelBox_Maker" main.py
      
    - name: Upload Mac App as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bee_ModelBox_Maker-macOS
        path: dist/Bee_ModelBox_Maker.app
